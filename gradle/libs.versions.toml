[versions]
kotlin = "2.2.0"
klite = "main-SNAPSHOT"
univocityParsers = "2.8.4"
clikt = "5.1.0"
sqliteJdbc = "3.51.3.0"
shadow = "9.4.0"

[libraries]
klite-server = { module = "com.github.keksworks.klite:klite-server", version.ref = "klite" }
klite-json = { module = "com.github.keksworks.klite:klite-json", version.ref = "klite" }
klite-jobs = { module = "com.github.keksworks.klite:klite-jobs", version.ref = "klite" }
klite-openapi = { module = "com.github.keksworks.klite:klite-openapi", version.ref = "klite" }
univocity-parsers = { module = "com.univocity:univocity-parsers", version.ref = "univocityParsers" }
clikt = { module = "com.github.ajalt.clikt:clikt", version.ref = "clikt" }
sqlite-jdbc = { module = "org.xerial:sqlite-jdbc", version.ref = "sqliteJdbc" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }

