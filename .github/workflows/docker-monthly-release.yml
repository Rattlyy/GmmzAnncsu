name: Docker Monthly Release

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release-full:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set vars
        id: vars
        run: |
          PROJECT_VERSION=$(sed -n 's/^version\s*=\s*"\([^"]*\)".*/\1/p' build.gradle.kts | head -n1)
          if [ -z "$PROJECT_VERSION" ]; then
            echo "Unable to extract version from build.gradle.kts" >&2
            exit 1
          fi
          echo "image_name=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "project_version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"
          echo "date_tag=${PROJECT_VERSION}-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push full image (init already run)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.date_tag }}

